<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Teste Logo</title>
<style>
.logo-img { height: 30px; width: auto; display: block; }
</style>
</head>
<body>
<p>Teste 1 - img direto no HTML:</p>
<img src="assets/img/logo.png" style="height:30px" alt="logo direto">

<p>Teste 2 - via JS:</p>
<div id="alvo"></div>

<script>
const img = document.createElement('img');
img.src = 'assets/img/logo.png';
img.style.height = '30px';
img.onload = () => { document.getElementById('alvo').textContent = 'JS: carregou OK'; };
img.onerror = () => { document.getElementById('alvo').textContent = 'JS: ERRO ao carregar - ' + img.src; };
document.getElementById('alvo').appendChild(img);
</script>
</body>
</html>
